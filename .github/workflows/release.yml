name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_label: windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            os_label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os_label: linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ matrix.platform }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ matrix.platform }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust compilation
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Import Windows code signing certificate
        if: runner.os == 'Windows'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType directory -Path certificate
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item -Path certificate/tempCert.txt
          Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)
          Remove-Item -Path certificate/certificate.pfx
        shell: pwsh

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifacts with platform label
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          LABEL="${{ matrix.os_label }}"
          mkdir -p artifacts

          shopt -s nullglob
          for file in \
            "$BUNDLE_DIR"/dmg/*.dmg \
            "$BUNDLE_DIR"/nsis/*.exe \
            "$BUNDLE_DIR"/msi/*.msi \
            "$BUNDLE_DIR"/appimage/*.AppImage \
            "$BUNDLE_DIR"/deb/*.deb \
            "$BUNDLE_DIR"/rpm/*.rpm; do
            [ -f "$file" ] || continue
            base=$(basename "$file")
            # Insert platform label before the final extension
            if [[ "$base" == *.tar.gz ]]; then
              stem="${base%.tar.gz}"
              newname="${stem}-${LABEL}.tar.gz"
            else
              stem="${base%.*}"
              ext="${base##*.}"
              newname="${stem}-${LABEL}.${ext}"
            fi
            cp "$file" "artifacts/$newname"
          done
          ls -la artifacts/ || true

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/*
          body: |
            ## 安装说明

            ### macOS
            由于应用未经过 Apple 公证，首次打开时可能提示"已损坏"或"无法验证"。请按以下步骤操作：

            1. 安装应用后，打开终端运行：
               ```
               xattr -cr /Applications/DataZen.app
               ```
            2. 然后正常打开应用即可。

            或者：右键点击应用 → 选择"打开" → 在弹出的对话框中点击"打开"。

            ### Windows
            直接运行 `.exe` 安装包或 `.msi` 安装包即可。

            ### Linux
            - **Debian/Ubuntu**: `sudo dpkg -i DataZen_*.deb`
            - **Fedora/RHEL**: `sudo rpm -i DataZen-*.rpm`
            - **AppImage**: `chmod +x DataZen_*.AppImage && ./DataZen_*.AppImage`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
