name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_label: windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            os_label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os_label: linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ matrix.platform }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ matrix.platform }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust compilation
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign macOS app (ad-hoc)
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name '*.app' -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing $APP_PATH"
            codesign --force --deep --sign - "$APP_PATH"
          fi

      - name: Rename artifacts with platform label
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          LABEL="${{ matrix.os_label }}"
          mkdir -p artifacts

          for dir in dmg macos nsis msi appimage deb rpm; do
            DIR_PATH="$BUNDLE_DIR/$dir"
            [ -d "$DIR_PATH" ] || continue
            for file in "$DIR_PATH"/*; do
              [ -f "$file" ] || continue
              base=$(basename "$file")
              ext="${base#*.}"
              name="${base%%.*}"
              newname="${name}-${LABEL}.${ext}"
              cp "$file" "artifacts/$newname"
            done
          done
          ls -la artifacts/ || true

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
