<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1400" height="900" fill="#0f172a"/>
  
  <!-- 标题栏 -->
  <rect width="1400" height="40" fill="#1e293b"/>
  <circle cx="20" cy="20" r="6" fill="#ef4444"/>
  <circle cx="40" cy="20" r="6" fill="#fbbf24"/>
  <circle cx="60" cy="20" r="6" fill="#22c55e"/>
  <text x="600" y="25" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">查询 - myapp_production - DataZen</text>
  
  <!-- 工具栏 -->
  <rect y="40" width="1400" height="48" fill="#1e293b"/>
  <rect y="87" width="1400" height="1" fill="#334155"/>
  
  <!-- 执行按钮 -->
  <rect x="16" y="48" width="80" height="32" rx="6" fill="#22c55e" filter="url(#shadow)"/>
  <text x="56" y="69" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">执行</text>
  
  <!-- 执行选中 -->
  <rect x="104" y="48" width="100" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="154" y="69" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">执行选中</text>
  
  <!-- 格式化 -->
  <rect x="328" y="48" width="80" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="368" y="69" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">格式化</text>
  
  <!-- 清空 -->
  <rect x="420" y="48" width="60" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="450" y="69" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">清空</text>
  
  <!-- 历史记录 -->
  <rect x="696" y="48" width="80" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="736" y="69" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">历史</text>
  
  <!-- SQL 编辑器区域 -->
  <rect y="88" width="1400" height="280" fill="#0f172a"/>
  <rect y="367" width="1400" height="1" fill="#334155"/>
  
  <!-- 编辑器标签页 -->
  <rect y="88" width="1400" height="32" fill="#1e293b"/>
  <rect y="119" width="1400" height="1" fill="#334155"/>
  
  <rect x="0" y="88" width="140" height="32" fill="#0f172a"/>
  <rect x="0" y="119" width="140" height="1" fill="#3b82f6"/>
  <text x="24" y="109" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="12">查询 1</text>
  
  <!-- 行号背景 -->
  <rect x="0" y="120" width="48" height="247" fill="#0f172a"/>
  
  <!-- 行号 -->
  <text x="24" y="152" text-anchor="end" fill="#475569" font-family="JetBrains Mono, monospace" font-size="13">1</text>
  <text x="24" y="176" text-anchor="end" fill="#475569" font-family="JetBrains Mono, monospace" font-size="13">2</text>
  <text x="24" y="200" text-anchor="end" fill="#475569" font-family="JetBrains Mono, monospace" font-size="13">3</text>
  <text x="24" y="224" text-anchor="end" fill="#475569" font-family="JetBrains Mono, monospace" font-size="13">4</text>
  <text x="24" y="248" text-anchor="end" fill="#475569" font-family="JetBrains Mono, monospace" font-size="13">5</text>
  
  <!-- SQL 代码 - 有错误的SQL -->
  <text x="56" y="152" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">SELECT</text>
  <text x="120" y="152" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">*</text>
  
  <text x="56" y="176" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">FROM</text>
  <text x="104" y="176" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">userss</text>
  <!-- 错误下划线 -->
  <line x1="104" y1="180" x2="152" y2="180" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
  
  <text x="56" y="200" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">WHERE</text>
  <text x="112" y="200" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">status</text>
  <text x="160" y="200" fill="#3b82f6" font-family="JetBrains Mono, monospace" font-size="13">=</text>
  <text x="176" y="200" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">'active'</text>
  
  <text x="56" y="224" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">ORDER</text>
  <text x="112" y="224" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">BY</text>
  <text x="136" y="224" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">created_at</text>
  <text x="232" y="224" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">DESC</text>
  
  <text x="56" y="248" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">LIMIT</text>
  <text x="112" y="248" fill="#fbbf24" font-family="JetBrains Mono, monospace" font-size="13">10</text>
  
  <!-- 下半部分 - 错误结果 -->
  <rect y="368" width="1400" height="532" fill="#0f172a"/>
  
  <!-- 结果标签页 -->
  <rect y="368" width="1400" height="32" fill="#1e293b"/>
  <rect y="399" width="1400" height="1" fill="#334155"/>
  
  <rect x="0" y="368" width="80" height="32" fill="#0f172a"/>
  <rect x="0" y="399" width="80" height="1" fill="#ef4444"/>
  <text x="40" y="389" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="12">错误</text>
  
  <rect x="80" y="368" width="80" height="32" fill="#1e293b"/>
  <text x="120" y="389" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">消息</text>
  
  <!-- 错误信息面板 -->
  <rect x="48" y="420" width="1304" height="200" rx="12" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  
  <!-- 错误图标 -->
  <circle cx="96" cy="480" r="24" fill="#ef4444" opacity="0.2"/>
  <text x="96" y="488" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="24" font-weight="bold">!</text>
  
  <!-- 错误标题 -->
  <text x="144" y="468" fill="#ef4444" font-family="Inter, sans-serif" font-size="16" font-weight="600">SQL 语法错误</text>
  
  <!-- 错误代码 -->
  <rect x="144" y="480" width="80" height="24" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="184" y="497" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="11" font-weight="500">ERROR 42P01</text>
  
  <!-- 错误描述 -->
  <text x="144" y="528" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="14">relation "userss" does not exist</text>
  
  <!-- 错误位置 -->
  <text x="144" y="560" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">位置: 第 2 行, 列 5-10</text>
  
  <!-- 错误SQL片段 -->
  <rect x="144" y="576" width="400" height="32" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="597" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="12">FROM</text>
  <text x="200" y="597" fill="#ef4444" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold">userss</text>
  
  <!-- 提示修复 -->
  <text x="560" y="597" fill="#3b82f6" font-family="Inter, sans-serif" font-size="12">您是指 "users" 吗? →</text>
  
  <!-- 帮助链接 -->
  <rect x="144" y="624" width="160" height="32" rx="6" fill="#334155"/>
  <text x="224" y="645" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">查看文档</text>
  
  <rect x="320" y="624" width="160" height="32" rx="6" fill="#334155"/>
  <text x="400" y="645" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">搜索解决方案</text>
  
  <!-- 查询统计 -->
  <rect y="680" width="1400" height="48" fill="#1e293b"/>
  <rect y="680" width="1400" height="1" fill="#334155"/>
  
  <text x="24" y="710" fill="#ef4444" font-family="Inter, sans-serif" font-size="12">✕ 执行失败</text>
  <text x="140" y="710" fill="#64748b" font-family="Inter, sans-serif" font-size="12">|</text>
  <text x="160" y="710" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">耗时: 12.3ms</text>
  <text x="280" y="710" fill="#64748b" font-family="Inter, sans-serif" font-size="12">|</text>
  <text x="300" y="710" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">错误码: 42P01</text>
  
  <!-- 重新执行按钮 -->
  <rect x="1180" y="688" width="100" height="32" rx="6" fill="#3b82f6"/>
  <text x="1230" y="709" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">重新执行</text>
  
  <rect x="1300" y="688" width="80" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1340" y="709" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">关闭</text>
  
  <!-- 状态栏 -->
  <rect y="852" width="1400" height="48" fill="#1e293b"/>
  <rect y="852" width="1400" height="1" fill="#334155"/>
  <circle cx="32" cy="876" r="4" fill="#22c55e"/>
  <text x="48" y="880" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">已连接</text>
  <text x="600" y="880" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">PostgreSQL 14.2 | prod-db.example.com:5432</text>
  <text x="1376" y="880" text-anchor="end" fill="#64748b" font-family="Inter, sans-serif" font-size="12">⌘+Enter 执行</text>
</svg>