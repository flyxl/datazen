<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="#0f172a"/>
  
  <!-- 标题栏 -->
  <rect width="1200" height="40" fill="#1e293b"/>
  <circle cx="20" cy="20" r="6" fill="#ef4444"/>
  <circle cx="40" cy="20" r="6" fill="#fbbf24"/>
  <circle cx="60" cy="20" r="6" fill="#22c55e"/>
  <text x="600" y="25" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13" font-weight="500">DataZen - 连接管理</text>
  
  <!-- 工具栏 -->
  <rect y="40" width="1200" height="56" fill="#1e293b"/>
  <rect y="95" width="1200" height="1" fill="#334155"/>
  
  <!-- 新建连接按钮 -->
  <rect x="24" y="52" width="120" height="32" rx="6" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="84" y="72" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="500">+ 新建连接</text>
  
  <!-- 导入连接按钮 -->
  <rect x="160" y="52" width="100" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="210" y="72" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">导入连接</text>
  
  <!-- 设置按钮 -->
  <circle cx="1160" cy="68" r="12" fill="transparent"/>
  <path d="M1154 64 L1154 72 M1166 64 L1166 72 M1154 76 L1154 80 M1166 76 L1166 80 M1150 68 L1158 68 M1162 68 L1170 68 M1150 76 L1158 76 M1162 76 L1170 76" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 主内容区 - 空状态 -->
  
  <!-- 空状态插图 -->
  <g transform="translate(600, 320)">
    <!-- 数据库图标背景圆 -->
    <circle cx="0" cy="0" r="80" fill="#3b82f6" opacity="0.1"/>
    <circle cx="0" cy="0" r="60" fill="#3b82f6" opacity="0.15"/>
    
    <!-- 数据库图标 -->
    <ellipse cx="0" cy="-20" rx="40" ry="12" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <path d="M-40 -20 L-40 20 Q-40 32 0 32 Q40 32 40 20 L40 -20" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <ellipse cx="0" cy="20" rx="40" ry="12" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- 空状态文字 -->
  <text x="600" y="440" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="20" font-weight="600">还没有保存任何连接</text>
  <text x="600" y="468" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="14">创建一个新连接来开始管理你的数据库</text>
  
  <!-- 快速操作按钮 -->
  <rect x="480" y="500" width="120" height="44" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="540" y="528" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="14" font-weight="500">+ 新建连接</text>
  
  <rect x="620" y="500" width="100" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="670" y="528" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="14">导入</text>
  
  <!-- 快捷方式提示 -->
  <text x="600" y="580" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">快捷键: ⌘+N 新建连接</text>
  
  <!-- 支持的数据库类型提示 -->
  <text x="600" y="640" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">支持的数据库类型</text>
  
  <!-- 数据库类型图标 -->
  <g transform="translate(400, 670)">
    <!-- PostgreSQL -->
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#1e293b"/>
    <ellipse cx="30" cy="22" rx="16" ry="6" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M14 22 L14 38 Q14 44 30 44 Q46 44 46 38 L46 22" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="30" y="56" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10">PostgreSQL</text>
  </g>
  
  <g transform="translate(480, 670)">
    <!-- MySQL -->
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#1e293b"/>
    <ellipse cx="30" cy="22" rx="16" ry="6" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <path d="M14 22 L14 38 Q14 44 30 44 Q46 44 46 38 L46 22" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="30" y="56" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10">MySQL</text>
  </g>
  
  <g transform="translate(560, 670)">
    <!-- MariaDB -->
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#1e293b"/>
    <ellipse cx="30" cy="22" rx="16" ry="6" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <path d="M14 22 L14 38 Q14 44 30 44 Q46 44 46 38 L46 22" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="30" y="56" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10">MariaDB</text>
  </g>
  
  <g transform="translate(640, 670)">
    <!-- SQLite -->
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#1e293b"/>
    <path d="M20 18 L40 18 L40 42 L20 42 Z" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M20 18 L26 14 L46 14 L40 18" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="30" y="56" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10">SQLite</text>
  </g>
  
  <g transform="translate(720, 670)">
    <!-- Redis -->
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#1e293b"/>
    <text x="30" y="32" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="16" font-weight="bold">R</text>
    <text x="30" y="56" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10">Redis</text>
    <!-- 计划中标签 -->
    <rect x="8" y="8" width="32" height="14" rx="3" fill="#334155"/>
    <text x="24" y="18" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="8">计划中</text>
  </g>
  
  <!-- 状态栏 -->
  <rect y="760" width="1200" height="40" fill="#1e293b"/>
  <rect y="760" width="1200" height="1" fill="#334155"/>
  <text x="24" y="784" fill="#64748b" font-family="Inter, sans-serif" font-size="12">0 个连接</text>
  <text x="600" y="784" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">DataZen v1.0.0</text>
  <text x="1176" y="784" text-anchor="end" fill="#64748b" font-family="Inter, sans-serif" font-size="12">⌘N 新建连接</text>
</svg>