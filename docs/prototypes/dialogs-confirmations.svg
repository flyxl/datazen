<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景遮罩 -->
  <rect width="1200" height="900" fill="#0f172a" opacity="0.8"/>
  
  <!-- ========== 删除确认对话框 ========== -->
  <g transform="translate(0, 0)">
    <g filter="url(#shadow)">
      <rect x="50" y="200" width="480" height="260" rx="16" fill="#1e293b"/>
      
      <!-- 标题栏 -->
      <rect x="50" y="200" width="480" height="56" rx="16" fill="#1e293b"/>
      <rect x="50" y="240" width="480" height="16" fill="#1e293b"/>
      <circle cx="78" cy="228" r="6" fill="#ef4444"/>
      <circle cx="98" cy="228" r="6" fill="#fbbf24"/>
      <circle cx="118" cy="228" r="6" fill="#22c55e"/>
      <text x="290" y="233" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">确认删除</text>
      
      <!-- 图标 -->
      <circle cx="110" cy="300" r="24" fill="#ef4444" opacity="0.2"/>
      <text x="110" y="308" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="24">!</text>
      
      <!-- 内容 -->
      <text x="150" y="292" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="500">确定要删除选中的数据吗？</text>
      <text x="150" y="316" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">将删除 3 行数据，此操作无法撤销。</text>
      
      <!-- 警告提示 -->
      <rect x="80" y="340" width="420" height="40" rx="6" fill="#fbbf24" opacity="0.1" stroke="#fbbf24" stroke-width="1"/>
      <text x="100" y="365" fill="#fbbf24" font-family="Inter, sans-serif" font-size="12">⚠ 这些数据可能被其他表引用，删除可能失败。</text>
      
      <!-- 底部按钮 -->
      <rect x="50" y="400" width="480" height="60" rx="0 0 16 16" fill="#1e293b"/>
      <rect x="50" y="400" width="480" height="1" fill="#334155"/>
      
      <rect x="238" y="416" width="80" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="278" y="440" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">取消</text>
      
      <rect x="334" y="416" width="100" height="36" rx="6" fill="#ef4444" filter="url(#smallShadow)"/>
      <text x="384" y="440" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="500">删除</text>
    </g>
    
    <!-- 标签 -->
    <text x="290" y="480" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">删除确认对话框</text>
  </g>
  
  <!-- ========== 保存提示对话框 ========== -->
  <g transform="translate(500, 0)">
    <g filter="url(#shadow)">
      <rect x="50" y="200" width="480" height="220" rx="16" fill="#1e293b"/>
      
      <rect x="50" y="200" width="480" height="56" rx="16" fill="#1e293b"/>
      <rect x="50" y="240" width="480" height="16" fill="#1e293b"/>
      <circle cx="78" cy="228" r="6" fill="#ef4444"/>
      <circle cx="98" cy="228" r="6" fill="#fbbf24"/>
      <circle cx="118" cy="228" r="6" fill="#22c55e"/>
      <text x="290" y="233" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">保存更改</text>
      
      <circle cx="110" cy="288" r="24" fill="#fbbf24" opacity="0.2"/>
      <text x="110" y="296" text-anchor="middle" fill="#fbbf24" font-family="Inter, sans-serif" font-size="20">?</text>
      
      <text x="150" y="288" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="500">有未保存的更改</text>
      <text x="150" y="312" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">是否在关闭前保存这些更改？</text>
      
      <rect x="50" y="360" width="480" height="60" rx="0 0 16 16" fill="#1e293b"/>
      <rect x="50" y="360" width="480" height="1" fill="#334155"/>
      
      <rect x="80" y="376" width="80" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="120" y="400" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">不保存</text>
      
      <rect x="180" y="376" width="80" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="220" y="400" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">取消</text>
      
      <rect x="280" y="376" width="80" height="36" rx="6" fill="#22c55e" filter="url(#smallShadow)"/>
      <text x="320" y="400" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="500">保存</text>
    </g>
    
    <text x="290" y="440" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">保存提示对话框</text>
  </g>
  
  <!-- ========== 成功提示对话框 ========== -->
  <g transform="translate(0, 280)">
    <g filter="url(#shadow)">
      <rect x="50" y="200" width="480" height="180" rx="16" fill="#1e293b"/>
      
      <rect x="50" y="200" width="480" height="56" rx="16" fill="#1e293b"/>
      <rect x="50" y="240" width="480" height="16" fill="#1e293b"/>
      <circle cx="78" cy="228" r="6" fill="#ef4444"/>
      <circle cx="98" cy="228" r="6" fill="#fbbf24"/>
      <circle cx="118" cy="228" r="6" fill="#22c55e"/>
      <text x="290" y="233" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">操作成功</text>
      
      <circle cx="110" cy="284" r="24" fill="#22c55e" opacity="0.2"/>
      <path d="M98 284 L106 292 L122 276" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      
      <text x="150" y="280" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="500">数据已保存</text>
      <text x="150" y="304" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">成功更新了 3 行数据</text>
      
      <rect x="50" y="340" width="480" height="40" rx="0 0 16 16" fill="#1e293b"/>
      <rect x="50" y="340" width="480" height="1" fill="#334155"/>
      
      <rect x="238" y="348" width="100" height="32" rx="6" fill="#3b82f6"/>
      <text x="288" y="370" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="500">确定</text>
    </g>
    
    <text x="290" y="400" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">成功提示对话框</text>
  </g>
  
  <!-- ========== 导出选项对话框 ========== -->
  <g transform="translate(500, 280)">
    <g filter="url(#shadow)">
      <rect x="50" y="200" width="480" height="360" rx="16" fill="#1e293b"/>
      
      <rect x="50" y="200" width="480" height="56" rx="16" fill="#1e293b"/>
      <rect x="50" y="240" width="480" height="16" fill="#1e293b"/>
      <circle cx="78" cy="228" r="6" fill="#ef4444"/>
      <circle cx="98" cy="228" r="6" fill="#fbbf24"/>
      <circle cx="118" cy="228" r="6" fill="#22c55e"/>
      <text x="290" y="233" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">导出数据</text>
      
      <!-- 导出格式 -->
      <text x="80" y="280" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">导出格式</text>
      
      <rect x="80" y="292" width="100" height="40" rx="6" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
      <text x="130" y="318" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">CSV</text>
      
      <rect x="196" y="292" width="100" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="246" y="318" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">JSON</text>
      
      <rect x="312" y="292" width="100" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="362" y="318" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">SQL</text>
      
      <!-- 导出范围 -->
      <text x="80" y="360" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">导出范围</text>
      
      <rect x="80" y="372" width="140" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="150" y="398" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">当前页 (50 行)</text>
      
      <rect x="236" y="372" width="140" height="40" rx="6" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
      <text x="306" y="398" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">全部 (1.2M 行)</text>
      
      <!-- 编码选项 -->
      <text x="80" y="440" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">文件编码</text>
      <rect x="80" y="452" width="160" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="160" y="478" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">UTF-8</text>
      <path d="M216 468 L224 476 L232 468" fill="none" stroke="#64748b" stroke-width="1.5"/>
      
      <!-- 包含表头 -->
      <rect x="80" y="510" width="20" height="20" rx="4" fill="#3b82f6"/>
      <path d="M84 520 L88 524 L96 516" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="525" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">包含列标题</text>
      
      <rect x="50" y="520" width="480" height="40" rx="0 0 16 16" fill="#1e293b"/>
      <rect x="50" y="520" width="480" height="1" fill="#334155"/>
      
      <rect x="238" y="528" width="80" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="278" y="550" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">取消</text>
      
      <rect x="334" y="528" width="100" height="32" rx="6" fill="#3b82f6" filter="url(#smallShadow)"/>
      <text x="384" y="550" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="500">导出</text>
    </g>
    
    <text x="290" y="580" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">导出选项对话框</text>
  </g>
  
  <!-- 快捷键提示 -->
  <text x="600" y="850" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">Enter 确认 · Esc 取消</text>
</svg>