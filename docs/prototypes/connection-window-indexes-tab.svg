<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1400" height="900" fill="#0f172a"/>
  
  <!-- 标题栏 -->
  <rect width="1400" height="40" fill="#1e293b"/>
  <circle cx="20" cy="20" r="6" fill="#ef4444"/>
  <circle cx="40" cy="20" r="6" fill="#fbbf24"/>
  <circle cx="60" cy="20" r="6" fill="#22c55e"/>
  <circle cx="100" cy="20" r="4" fill="#22c55e"/>
  <text x="600" y="25" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">主数据库 - PostgreSQL - DataZen</text>
  
  <!-- 工具栏 -->
  <rect y="40" width="1400" height="48" fill="#1e293b"/>
  <rect y="87" width="1400" height="1" fill="#334155"/>
  
  <!-- 左侧边栏 (简化) -->
  <rect y="88" width="280" height="812" fill="#1e293b"/>
  <rect x="280" y="88" width="1" height="812" fill="#334155"/>
  <text x="24" y="120" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">users</text>
  
  <!-- ========== 索引标签页内容 ========== -->
  <g transform="translate(0, 0)">
    <!-- 标签页栏 -->
    <rect x="280" y="88" width="1120" height="40" fill="#1e293b"/>
    <rect x="280" y="127" width="1120" height="1" fill="#334155"/>
    
    <rect x="280" y="88" width="100" height="40" fill="#1e293b"/>
    <text x="330" y="113" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">结构</text>
    
    <rect x="380" y="88" width="100" height="40" fill="#1e293b"/>
    <text x="430" y="113" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">数据</text>
    
    <!-- 索引标签页 (选中) -->
    <rect x="480" y="88" width="100" height="40" fill="#0f172a"/>
    <rect x="480" y="126" width="100" height="1" fill="#3b82f6"/>
    <text x="530" y="113" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">索引</text>
    
    <rect x="580" y="88" width="100" height="40" fill="#1e293b"/>
    <text x="630" y="113" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">外键</text>
    
    <rect x="680" y="88" width="100" height="40" fill="#1e293b"/>
    <text x="730" y="113" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">DDL</text>
    
    <!-- 索引内容 -->
    <text x="304" y="160" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="16" font-weight="600">索引</text>
    <text x="360" y="160" fill="#64748b" font-family="Inter, sans-serif" font-size="13">· 3 个索引</text>
    
    <!-- 索引表格 -->
    <rect x="296" y="176" width="520" height="40" fill="#1e293b"/>
    <rect x="296" y="215" width="520" height="1" fill="#334155"/>
    
    <text x="312" y="201" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">名称</text>
    <text x="452" y="201" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">类型</text>
    <text x="552" y="201" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">列</text>
    
    <!-- 主键索引 -->
    <rect x="296" y="216" width="520" height="48" fill="#0f172a"/>
    <rect x="296" y="263" width="520" height="1" fill="#334155"/>
    <text x="312" y="243" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">users_pkey</text>
    <rect x="452" y="228" width="40" height="20" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="472" y="243" text-anchor="middle" fill="#3b82f6" font-family="Inter, sans-serif" font-size="10">PRIMARY</text>
    <text x="552" y="243" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">id</text>
    
    <!-- 唯一索引 -->
    <rect x="296" y="264" width="520" height="48" fill="#0f172a"/>
    <rect x="296" y="311" width="520" height="1" fill="#334155"/>
    <text x="312" y="291" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">users_email_key</text>
    <rect x="452" y="276" width="32" height="20" rx="4" fill="#f59e0b" opacity="0.2"/>
    <text x="468" y="291" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="10">UNIQUE</text>
    <text x="552" y="291" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">email</text>
    
    <!-- 普通索引 -->
    <rect x="296" y="312" width="520" height="48" fill="#0f172a"/>
    <rect x="296" y="359" width="520" height="1" fill="#334155"/>
    <text x="312" y="339" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">users_status_idx</text>
    <rect x="452" y="324" width="32" height="20" rx="4" fill="#334155"/>
    <text x="468" y="339" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10">INDEX</text>
    <text x="552" y="339" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">status, created_at</text>
  </g>
  
  <!-- ========== 外键标签页内容 ========== -->
  <g transform="translate(560, 0)">
    <text x="304" y="160" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="16" font-weight="600">外键</text>
    <text x="360" y="160" fill="#64748b" font-family="Inter, sans-serif" font-size="13">· 2 个外键</text>
    
    <!-- 外键表格 -->
    <rect x="296" y="176" width="520" height="40" fill="#1e293b"/>
    <rect x="296" y="215" width="520" height="1" fill="#334155"/>
    
    <text x="312" y="201" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">名称</text>
    <text x="432" y="201" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">列</text>
    <text x="512" y="201" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">引用表</text>
    <text x="612" y="201" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">引用列</text>
    
    <!-- 外键行 -->
    <rect x="296" y="216" width="520" height="48" fill="#0f172a"/>
    <rect x="296" y="263" width="520" height="1" fill="#334155"/>
    <text x="312" y="243" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="12">fk_users_role</text>
    <text x="432" y="243" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">role_id</text>
    <text x="512" y="243" fill="#3b82f6" font-family="Inter, sans-serif" font-size="13">roles</text>
    <text x="612" y="243" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">id</text>
    
    <rect x="296" y="264" width="520" height="48" fill="#0f172a"/>
    <rect x="296" y="311" width="520" height="1" fill="#334155"/>
    <text x="312" y="291" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="12">fk_users_dept</text>
    <text x="432" y="291" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">department_id</text>
    <text x="512" y="291" fill="#3b82f6" font-family="Inter, sans-serif" font-size="13">departments</text>
    <text x="612" y="291" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">id</text>
  </g>
  
  <!-- ========== DDL 标签页内容 ========== -->
  <g transform="translate(0, 380)">
    <rect x="280" y="88" width="1120" height="40" fill="#1e293b"/>
    <rect x="280" y="127" width="1120" height="1" fill="#334155"/>
    
    <rect x="280" y="88" width="100" height="40" fill="#1e293b"/>
    <text x="330" y="113" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">结构</text>
    
    <rect x="380" y="88" width="100" height="40" fill="#1e293b"/>
    <text x="430" y="113" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">数据</text>
    
    <rect x="480" y="88" width="100" height="40" fill="#1e293b"/>
    <text x="530" y="113" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">索引</text>
    
    <rect x="580" y="88" width="100" height="40" fill="#1e293b"/>
    <text x="630" y="113" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">外键</text>
    
    <!-- DDL标签页 (选中) -->
    <rect x="680" y="88" width="100" height="40" fill="#0f172a"/>
    <rect x="680" y="126" width="100" height="1" fill="#3b82f6"/>
    <text x="730" y="113" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">DDL</text>
    
    <!-- DDL 内容 -->
    <text x="304" y="160" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="16" font-weight="600">DDL</text>
    
    <!-- 复制按钮 -->
    <rect x="1220" y="140" width="80" height="32" rx="6" fill="#334155"/>
    <text x="1260" y="161" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">复制</text>
    
    <!-- DDL 代码块 -->
    <rect x="296" y="176" width="1000" height="260" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    
    <!-- SQL 代码 -->
    <text x="312" y="208" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">CREATE TABLE</text>
    <text x="444" y="208" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">users (</text>
    
    <text x="328" y="232" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">id</text>
    <text x="368" y="232" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">BIGSERIAL</text>
    <text x="472" y="232" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">PRIMARY KEY</text>
    <text x="576" y="232" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">,</text>
    
    <text x="328" y="256" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">email</text>
    <text x="380" y="256" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="13">VARCHAR(255)</text>
    <text x="508" y="256" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">NOT NULL UNIQUE</text>
    <text x="640" y="256" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">,</text>
    
    <text x="328" y="280" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">name</text>
    <text x="376" y="280" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="13">VARCHAR(100)</text>
    <text x="504" y="280" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">,</text>
    
    <text x="328" y="304" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">password_hash</text>
    <text x="448" y="304" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="13">VARCHAR(255)</text>
    <text x="576" y="304" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">NOT NULL</text>
    <text x="656" y="304" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">,</text>
    
    <text x="328" y="328" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">status</text>
    <text x="380" y="328" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="13">VARCHAR(20)</text>
    <text x="484" y="328" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">NOT NULL DEFAULT</text>
    <text x="624" y="328" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">'active'</text>
    <text x="684" y="328" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">,</text>
    
    <text x="328" y="352" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">created_at</text>
    <text x="424" y="352" fill="#8b5cf6" font-family="JetBrains Mono, monospace" font-size="13">TIMESTAMP</text>
    <text x="520" y="352" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">NOT NULL DEFAULT</text>
    <text x="660" y="352" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">NOW()</text>
    <text x="716" y="352" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">,</text>
    
    <text x="328" y="376" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">updated_at</text>
    <text x="424" y="376" fill="#8b5cf6" font-family="JetBrains Mono, monospace" font-size="13">TIMESTAMP</text>
    <text x="520" y="376" fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="13">NOT NULL DEFAULT</text>
    <text x="660" y="376" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="13">NOW()</text>
    
    <text x="312" y="400" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">);</text>
  </g>
  
  <!-- 状态栏 -->
  <rect y="860" width="1400" height="40" fill="#1e293b"/>
  <rect y="860" width="1400" height="1" fill="#334155"/>
  <circle cx="32" cy="880" r="4" fill="#22c55e"/>
  <text x="48" y="885" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">已连接</text>
</svg>