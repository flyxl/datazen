<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="#0f172a"/>
  
  <!-- 标题栏 -->
  <rect width="1200" height="40" fill="#1e293b"/>
  <!-- macOS 窗口控制按钮 -->
  <circle cx="20" cy="20" r="6" fill="#ef4444"/>
  <circle cx="40" cy="20" r="6" fill="#fbbf24"/>
  <circle cx="60" cy="20" r="6" fill="#22c55e"/>
  <!-- 标题 -->
  <text x="600" y="25" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13" font-weight="500">DataZen - 连接管理</text>
  
  <!-- 工具栏 -->
  <rect y="40" width="1200" height="56" fill="#1e293b"/>
  <rect y="95" width="1200" height="1" fill="#334155"/>
  
  <!-- 搜索框 -->
  <rect x="24" y="52" width="280" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="48" y="72" fill="#64748b" font-family="Inter, sans-serif" font-size="13">搜索连接...</text>
  <!-- 搜索图标 -->
  <circle cx="36" cy="68" r="6" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <line x1="40" y1="72" x2="44" y2="76" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 新建连接按钮 -->
  <rect x="320" y="52" width="120" height="32" rx="6" fill="#3b82f6" filter="url(#smallShadow)"/>
  <text x="380" y="72" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="500">+ 新建连接</text>
  
  <!-- 视图切换按钮 -->
  <rect x="460" y="52" width="32" height="32" rx="6" fill="#334155"/>
  <rect x="468" y="60" width="16" height="16" rx="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="500" y="52" width="32" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <line x1="508" y1="60" x2="524" y2="60" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="508" y1="68" x2="524" y2="68" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="508" y1="76" x2="520" y2="76" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 设置按钮 -->
  <circle cx="1160" cy="68" r="12" fill="transparent"/>
  <path d="M1154 64 L1154 72 M1166 64 L1166 72 M1154 76 L1154 80 M1166 76 L1166 80 M1150 68 L1158 68 M1162 68 L1170 68 M1150 76 L1158 76 M1162 76 L1170 76" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 左侧分组面板 -->
  <rect x="0" y="96" width="220" height="704" fill="#1e293b"/>
  <rect x="220" y="96" width="1" height="704" fill="#334155"/>
  
  <!-- 分组标题 -->
  <text x="24" y="128" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">连接分组</text>
  
  <!-- 全部分组 -->
  <rect x="8" y="140" width="204" height="36" rx="6" fill="#334155"/>
  <text x="32" y="163" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">全部</text>
  <text x="180" y="163" fill="#64748b" font-family="Inter, sans-serif" font-size="12">8</text>
  
  <!-- 生产环境分组 -->
  <rect x="8" y="180" width="204" height="36" rx="6" fill="transparent"/>
  <circle cx="24" cy="198" r="4" fill="#ef4444"/>
  <text x="40" y="203" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">生产环境</text>
  <text x="180" y="203" fill="#64748b" font-family="Inter, sans-serif" font-size="12">2</text>
  
  <!-- 开发环境分组 -->
  <rect x="8" y="216" width="204" height="36" rx="6" fill="transparent"/>
  <circle cx="24" cy="234" r="4" fill="#22c55e"/>
  <text x="40" y="239" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">开发环境</text>
  <text x="180" y="239" fill="#64748b" font-family="Inter, sans-serif" font-size="12">4</text>
  
  <!-- 测试环境分组 -->
  <rect x="8" y="252" width="204" height="36" rx="6" fill="transparent"/>
  <circle cx="24" cy="270" r="4" fill="#fbbf24"/>
  <text x="40" y="275" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">测试环境</text>
  <text x="180" y="275" fill="#64748b" font-family="Inter, sans-serif" font-size="12">2</text>
  
  <!-- 新建分组按钮 -->
  <rect x="24" y="300" width="180" height="28" rx="4" fill="transparent" stroke="#334155" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="114" y="318" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">+ 新建分组</text>
  
  <!-- 主内容区 - 连接卡片网格 -->
  
  <!-- 最近连接标题 -->
  <text x="248" y="132" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">最近连接</text>
  
  <!-- 连接卡片1 - PostgreSQL 生产 -->
  <g filter="url(#shadow)">
    <rect x="248" y="148" width="280" height="140" rx="12" fill="url(#cardGrad)"/>
    <!-- 数据库图标 -->
    <rect x="272" y="172" width="40" height="32" rx="4" fill="#3b82f6" opacity="0.2"/>
    <ellipse cx="292" cy="180" rx="14" ry="6" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M278 180 L278 200 Q278 206 292 206 Q306 206 306 200 L306 180" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <line x1="278" y1="188" x2="306" y2="188" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- 连接名称 -->
    <text x="328" y="180" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">主数据库</text>
    <text x="328" y="200" fill="#64748b" font-family="Inter, sans-serif" font-size="12">PostgreSQL</text>
    <!-- 状态标签 -->
    <circle cx="268" cy="172" r="4" fill="#ef4444"/>
    <!-- 详情 -->
    <text x="272" y="240" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">prod-db.example.com:5432</text>
    <text x="272" y="260" fill="#64748b" font-family="Inter, sans-serif" font-size="11">上次连接: 2小时前</text>
    <!-- 连接按钮 -->
    <rect x="424" y="172" width="80" height="32" rx="6" fill="#3b82f6"/>
    <text x="464" y="192" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">连接</text>
  </g>
  
  <!-- 连接卡片2 - MySQL 开发 -->
  <g filter="url(#shadow)">
    <rect x="552" y="148" width="280" height="140" rx="12" fill="url(#cardGrad)"/>
    <!-- 数据库图标 -->
    <rect x="576" y="172" width="40" height="32" rx="4" fill="#f59e0b" opacity="0.2"/>
    <ellipse cx="596" cy="180" rx="14" ry="6" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <path d="M582 180 L582 200 Q582 206 596 206 Q610 206 610 200 L610 180" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <line x1="582" y1="188" x2="610" y2="188" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- 连接名称 -->
    <text x="632" y="180" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">开发数据库</text>
    <text x="632" y="200" fill="#64748b" font-family="Inter, sans-serif" font-size="12">MySQL</text>
    <!-- 状态标签 -->
    <circle cx="572" cy="172" r="4" fill="#22c55e"/>
    <!-- 详情 -->
    <text x="576" y="240" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">localhost:3306</text>
    <text x="576" y="260" fill="#64748b" font-family="Inter, sans-serif" font-size="11">上次连接: 昨天</text>
    <!-- 连接按钮 -->
    <rect x="728" y="172" width="80" height="32" rx="6" fill="#3b82f6"/>
    <text x="768" y="192" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">连接</text>
  </g>
  
  <!-- 连接卡片3 - SQLite -->
  <g filter="url(#shadow)">
    <rect x="856" y="148" width="280" height="140" rx="12" fill="url(#cardGrad)"/>
    <!-- 数据库图标 -->
    <rect x="880" y="172" width="40" height="32" rx="4" fill="#22c55e" opacity="0.2"/>
    <path d="M892 178 L920 178 L920 200 L892 200 Z" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M892 178 L900 172 L928 172 L920 178" fill="none" stroke="#22c55e" stroke-width="2"/>
    <line x1="900" y1="178" x2="928" y2="178" stroke="#22c55e" stroke-width="1.5"/>
    <!-- 连接名称 -->
    <text x="936" y="180" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">本地测试</text>
    <text x="936" y="200" fill="#64748b" font-family="Inter, sans-serif" font-size="12">SQLite</text>
    <!-- 状态标签 -->
    <circle cx="876" cy="172" r="4" fill="#22c55e"/>
    <!-- 详情 -->
    <text x="880" y="240" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">~/data/test.db</text>
    <text x="880" y="260" fill="#64748b" font-family="Inter, sans-serif" font-size="11">上次连接: 3天前</text>
    <!-- 连接按钮 -->
    <rect x="1032" y="172" width="80" height="32" rx="6" fill="#3b82f6"/>
    <text x="1072" y="192" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">连接</text>
  </g>
  
  <!-- 所有连接标题 -->
  <text x="248" y="324" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">所有连接</text>
  
  <!-- 连接卡片4 -->
  <g filter="url(#shadow)">
    <rect x="248" y="340" width="280" height="140" rx="12" fill="url(#cardGrad)"/>
    <rect x="272" y="364" width="40" height="32" rx="4" fill="#3b82f6" opacity="0.2"/>
    <ellipse cx="292" cy="372" rx="14" ry="6" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M278 372 L278 392 Q278 398 292 398 Q306 398 306 392 L306 372" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <line x1="278" y1="380" x2="306" y2="380" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="328" y="372" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">用户服务</text>
    <text x="328" y="392" fill="#64748b" font-family="Inter, sans-serif" font-size="12">PostgreSQL</text>
    <circle cx="268" cy="364" r="4" fill="#fbbf24"/>
    <text x="272" y="432" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">user-db.test.local:5432</text>
    <text x="272" y="452" fill="#64748b" font-family="Inter, sans-serif" font-size="11">上次连接: 1周前</text>
    <rect x="424" y="364" width="80" height="32" rx="6" fill="#3b82f6"/>
    <text x="464" y="384" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">连接</text>
  </g>
  
  <!-- 连接卡片5 -->
  <g filter="url(#shadow)">
    <rect x="552" y="340" width="280" height="140" rx="12" fill="url(#cardGrad)"/>
    <rect x="576" y="364" width="40" height="32" rx="4" fill="#3b82f6" opacity="0.2"/>
    <ellipse cx="596" cy="372" rx="14" ry="6" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M582 372 L582 392 Q582 398 596 398 Q610 398 610 392 L610 372" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <line x1="582" y1="380" x2="610" y2="380" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="632" y="372" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">订单服务</text>
    <text x="632" y="392" fill="#64748b" font-family="Inter, sans-serif" font-size="12">PostgreSQL</text>
    <circle cx="572" cy="364" r="4" fill="#22c55e"/>
    <text x="576" y="432" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">order-db.dev.local:5432</text>
    <text x="576" y="452" fill="#64748b" font-family="Inter, sans-serif" font-size="11">上次连接: 2天前</text>
    <rect x="728" y="364" width="80" height="32" rx="6" fill="#3b82f6"/>
    <text x="768" y="384" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">连接</text>
  </g>
  
  <!-- 连接卡片6 -->
  <g filter="url(#shadow)">
    <rect x="856" y="340" width="280" height="140" rx="12" fill="url(#cardGrad)"/>
    <rect x="880" y="364" width="40" height="32" rx="4" fill="#f59e0b" opacity="0.2"/>
    <ellipse cx="900" cy="372" rx="14" ry="6" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <path d="M886 372 L886 392 Q886 398 900 398 Q914 398 914 392 L914 372" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <line x1="886" y1="380" x2="914" y2="380" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="936" y="372" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">缓存服务</text>
    <text x="936" y="392" fill="#64748b" font-family="Inter, sans-serif" font-size="12">MySQL</text>
    <circle cx="876" cy="364" r="4" fill="#64748b"/>
    <text x="880" y="432" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">cache.example.com:3306</text>
    <text x="880" y="452" fill="#64748b" font-family="Inter, sans-serif" font-size="11">从未连接</text>
    <rect x="1032" y="364" width="80" height="32" rx="6" fill="#3b82f6"/>
    <text x="1072" y="384" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">连接</text>
  </g>
  
  <!-- 状态栏 -->
  <rect y="760" width="1200" height="40" fill="#1e293b"/>
  <rect y="760" width="1200" height="1" fill="#334155"/>
  <text x="24" y="784" fill="#64748b" font-family="Inter, sans-serif" font-size="12">8 个连接</text>
  <text x="600" y="784" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">DataZen v0.0.2</text>
  <text x="1176" y="784" text-anchor="end" fill="#64748b" font-family="Inter, sans-serif" font-size="12">⌘N 新建连接</text>
</svg>