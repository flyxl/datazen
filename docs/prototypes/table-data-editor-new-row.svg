<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="newRowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" style="stop-color:#22c55e" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1400" height="900" fill="#0f172a"/>
  
  <!-- 标题栏 -->
  <rect width="1400" height="40" fill="#1e293b"/>
  <circle cx="20" cy="20" r="6" fill="#ef4444"/>
  <circle cx="40" cy="20" r="6" fill="#fbbf24"/>
  <circle cx="60" cy="20" r="6" fill="#22c55e"/>
  <text x="600" y="25" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">users - 数据编辑 - DataZen</text>
  
  <!-- 工具栏 -->
  <rect y="40" width="1400" height="48" fill="#1e293b"/>
  <rect y="87" width="1400" height="1" fill="#334155"/>
  
  <!-- 刷新按钮 -->
  <rect x="16" y="48" width="36" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  
  <!-- 新增行按钮 -->
  <rect x="60" y="48" width="80" height="32" rx="6" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="100" y="69" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">+ 新增</text>
  
  <!-- 删除按钮 -->
  <rect x="152" y="48" width="80" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="192" y="69" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="12">删除</text>
  
  <!-- 分隔线 -->
  <rect x="248" y="52" width="1" height="24" fill="#334155"/>
  
  <!-- 撤销 -->
  <rect x="264" y="48" width="60" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="294" y="69" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">撤销</text>
  
  <!-- 重做 -->
  <rect x="336" y="48" width="60" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="366" y="69" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">重做</text>
  
  <!-- 数据表格 -->
  <rect x="16" y="100" width="1368" height="40" fill="#1e293b"/>
  <rect x="16" y="139" width="1368" height="1" fill="#334155"/>
  
  <!-- 表头 -->
  <rect x="24" y="108" width="16" height="16" rx="2" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="56" y="128" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">id</text>
  <text x="144" y="128" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">email</text>
  <text x="384" y="128" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">name</text>
  <text x="552" y="128" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">status</text>
  <text x="700" y="128" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">created_at</text>
  <text x="920" y="128" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-weight="500">updated_at</text>
  
  <!-- 新增行 (在最上方，高亮显示) -->
  <rect x="16" y="140" width="1368" height="56" fill="url(#newRowGrad)" stroke="#22c55e" stroke-width="1"/>
  <rect x="16" y="195" width="1368" height="1" fill="#22c55e" stroke-opacity="0.5"/>
  
  <!-- 新增行指示器 -->
  <rect x="16" y="140" width="4" height="56" fill="#22c55e"/>
  
  <!-- 新增行图标 -->
  <circle cx="40" cy="168" r="8" fill="#22c55e" opacity="0.2"/>
  <text x="40" y="172" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="12" font-weight="bold">+</text>
  
  <!-- id - 自动生成 -->
  <rect x="48" y="152" width="80" height="32" rx="4" fill="#334155"/>
  <text x="88" y="173" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">自动生成</text>
  
  <!-- email - 必填，正在输入 -->
  <rect x="140" y="152" width="220" height="32" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="156" y="173" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">newuser@example.com</text>
  <!-- 光标 -->
  <rect x="340" y="156" width="2" height="20" fill="#3b82f6">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- name - 空值提示 -->
  <rect x="380" y="152" width="140" height="32" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="396" y="173" fill="#64748b" font-family="Inter, sans-serif" font-size="12">输入姓名...</text>
  
  <!-- status - 默认值 -->
  <rect x="552" y="152" width="80" height="32" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="560" y="160" width="56" height="16" rx="3" fill="#22c55e" opacity="0.2"/>
  <text x="588" y="173" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="11">active</text>
  
  <!-- created_at - 自动生成 -->
  <rect x="700" y="152" width="180" height="32" rx="4" fill="#334155"/>
  <text x="790" y="173" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">自动: NOW()</text>
  
  <!-- updated_at - 自动生成 -->
  <rect x="920" y="152" width="180" height="32" rx="4" fill="#334155"/>
  <text x="1010" y="173" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">自动: NOW()</text>
  
  <!-- 现有数据行 -->
  <rect x="16" y="196" width="1368" height="48" fill="#0f172a"/>
  <rect x="16" y="243" width="1368" height="1" fill="#334155"/>
  <rect x="24" y="208" width="16" height="16" rx="2" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="56" y="225" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">1</text>
  <text x="144" y="225" fill="#3b82f6" font-family="JetBrains Mono, monospace" font-size="13">zhangsan@example.com</text>
  <text x="384" y="225" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">张三</text>
  <rect x="552" y="210" width="56" height="22" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="580" y="226" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="11">active</text>
  <text x="700" y="225" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="12">2024-01-15 09:30:22</text>
  
  <rect x="16" y="244" width="1368" height="48" fill="#0f172a"/>
  <rect x="16" y="291" width="1368" height="1" fill="#334155"/>
  <rect x="24" y="256" width="16" height="16" rx="2" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="56" y="273" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">2</text>
  <text x="144" y="273" fill="#3b82f6" font-family="JetBrains Mono, monospace" font-size="13">lisi@example.com</text>
  <text x="384" y="273" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">李四</text>
  <rect x="552" y="258" width="56" height="22" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="580" y="274" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="11">active</text>
  <text x="700" y="273" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="12">2024-02-01 11:45:33</text>
  
  <rect x="16" y="292" width="1368" height="48" fill="#0f172a"/>
  <rect x="16" y="339" width="1368" height="1" fill="#334155"/>
  <rect x="24" y="304" width="16" height="16" rx="2" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="56" y="321" fill="#f1f5f9" font-family="JetBrains Mono, monospace" font-size="13">3</text>
  <text x="144" y="321" fill="#3b82f6" font-family="JetBrains Mono, monospace" font-size="13">wangwu@example.com</text>
  <text x="384" y="321" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">王五</text>
  <rect x="552" y="306" width="56" height="22" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="580" y="322" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="11">active</text>
  <text x="700" y="321" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="12">2024-02-10 16:20:45</text>
  
  <!-- 更多行... -->
  <text x="56" y="420" fill="#64748b" font-family="Inter, sans-serif" font-size="12">...</text>
  
  <!-- 底部信息栏 -->
  <rect y="720" width="1400" height="48" fill="#1e293b"/>
  <rect y="720" width="1400" height="1" fill="#334155"/>
  
  <!-- 新增状态提示 -->
  <rect x="16" y="728" width="160" height="32" rx="6" fill="#22c55e" opacity="0.2"/>
  <text x="32" y="749" fill="#22c55e" font-family="Inter, sans-serif" font-size="12">● 新增中</text>
  <text x="100" y="749" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">1 行待保存</text>
  
  <!-- 验证提示 -->
  <text x="200" y="749" fill="#fbbf24" font-family="Inter, sans-serif" font-size="12">⚠ 邮箱需要唯一</text>
  
  <!-- 分页信息 -->
  <text x="600" y="749" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">显示 1-10 / 1,200,000 行</text>
  
  <!-- 提交按钮 -->
  <rect x="1140" y="728" width="100" height="32" rx="6" fill="#22c55e" filter="url(#shadow)"/>
  <text x="1190" y="749" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="500">保存新增</text>
  
  <!-- 取消按钮 -->
  <rect x="1252" y="728" width="100" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1302" y="749" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">取消</text>
  
  <!-- 字段提示面板 -->
  <rect x="16" y="784" width="1368" height="60" rx="8" fill="#1e293b"/>
  
  <text x="32" y="812" fill="#64748b" font-family="Inter, sans-serif" font-size="12" font-weight="500">字段说明:</text>
  <text x="120" y="812" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="12">id</text>
  <text x="140" y="812" fill="#64748b" font-family="Inter, sans-serif" font-size="12">- 自增主键</text>
  <text x="240" y="812" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="12">email</text>
  <text x="280" y="812" fill="#64748b" font-family="Inter, sans-serif" font-size="12">- 必填，唯一</text>
  <text x="380" y="812" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="12">name</text>
  <text x="420" y="812" fill="#64748b" font-family="Inter, sans-serif" font-size="12">- 可空</text>
  <text x="500" y="812" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="12">status</text>
  <text x="550" y="812" fill="#64748b" font-family="Inter, sans-serif" font-size="12">- 默认 'active'</text>
  <text x="680" y="812" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="12">created_at/updated_at</text>
  <text x="820" y="812" fill="#64748b" font-family="Inter, sans-serif" font-size="12">- 自动生成</text>
  
  <!-- 快捷键提示 -->
  <text x="1200" y="812" fill="#64748b" font-family="Inter, sans-serif" font-size="11">Tab 下一字段 · Enter 保存</text>
  
  <!-- 状态栏 -->
  <rect y="860" width="1400" height="40" fill="#1e293b"/>
  <rect y="860" width="1400" height="1" fill="#334155"/>
  <circle cx="32" cy="880" r="4" fill="#22c55e"/>
  <text x="48" y="885" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">已连接</text>
  <text x="600" y="885" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">users 表 · 新增模式</text>
</svg>