<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景遮罩 -->
  <rect width="1200" height="900" fill="#0f172a" opacity="0.8"/>
  
  <!-- ========== 左侧：测试成功状态 ========== -->
  <g transform="translate(-300, 0)">
    <g filter="url(#shadow)">
      <rect x="200" y="80" width="800" height="640" rx="16" fill="#1e293b"/>
      
      <!-- 标题栏 -->
      <rect x="200" y="80" width="800" height="56" rx="16" fill="#1e293b"/>
      <circle cx="228" cy="108" r="6" fill="#ef4444"/>
      <circle cx="248" cy="108" r="6" fill="#fbbf24"/>
      <circle cx="268" cy="108" r="6" fill="#22c55e"/>
      <text x="600" y="113" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">新建连接</text>
      
      <!-- 左侧数据库类型选择 -->
      <rect x="200" y="136" width="200" height="584" fill="#0f172a"/>
      <text x="224" y="168" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">选择数据库类型</text>
      
      <!-- PostgreSQL 选中 -->
      <rect x="216" y="184" width="168" height="56" rx="8" fill="#334155"/>
      <text x="276" y="214" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13" font-weight="500">PostgreSQL</text>
      
      <!-- 右侧表单区域 -->
      <text x="440" y="168" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">连接配置</text>
      
      <!-- 连接名称 -->
      <text x="440" y="204" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">连接名称</text>
      <text x="555" y="204" fill="#ef4444" font-family="Inter, sans-serif" font-size="13">*</text>
      <rect x="440" y="212" width="520" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="456" y="236" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">主数据库</text>
      
      <!-- 主机地址 -->
      <text x="440" y="276" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">主机地址</text>
      <text x="532" y="276" fill="#ef4444" font-family="Inter, sans-serif" font-size="13">*</text>
      <rect x="440" y="284" width="360" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="456" y="308" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">prod-db.example.com</text>
      
      <!-- 端口 -->
      <text x="820" y="276" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">端口</text>
      <text x="860" y="276" fill="#ef4444" font-family="Inter, sans-serif" font-size="13">*</text>
      <rect x="820" y="284" width="140" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="836" y="308" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">5432</text>
      
      <!-- 数据库名 -->
      <text x="440" y="348" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">数据库名</text>
      <rect x="440" y="356" width="520" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="456" y="380" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">myapp_production</text>
      
      <!-- 用户名 -->
      <text x="440" y="420" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">用户名</text>
      <rect x="440" y="428" width="360" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="456" y="452" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">postgres</text>
      
      <!-- 密码 -->
      <text x="820" y="420" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">密码</text>
      <rect x="820" y="428" width="140" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="836" y="452" fill="#64748b" font-family="Inter, sans-serif" font-size="13">••••••••</text>
      
      <!-- 测试成功提示框 -->
      <rect x="440" y="492" width="520" height="100" rx="8" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1"/>
      <circle cx="464" cy="524" r="12" fill="#22c55e" opacity="0.2"/>
      <path d="M458 524 L462 528 L470 520" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="488" y="520" fill="#22c55e" font-family="Inter, sans-serif" font-size="14" font-weight="500">连接成功!</text>
      <text x="488" y="544" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">PostgreSQL 14.2</text>
      <text x="488" y="564" fill="#64748b" font-family="Inter, sans-serif" font-size="11">服务器时间: 2024-03-20 14:30:25 UTC</text>
      
      <!-- 高级设置折叠 -->
      <rect x="440" y="612" width="520" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="456" y="638" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">高级设置</text>
      <path d="M936 622 L944 630 L952 622" fill="none" stroke="#64748b" stroke-width="1.5"/>
      
      <!-- 底部按钮 -->
      <rect x="200" y="664" width="800" height="56" rx="0 0 16 16" fill="#1e293b"/>
      <rect x="200" y="664" width="800" height="1" fill="#334155"/>
      
      <!-- 测试连接按钮 (成功后显示再次测试) -->
      <rect x="440" y="680" width="120" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="500" y="704" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">再次测试</text>
      
      <rect x="720" y="680" width="80" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="760" y="704" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">取消</text>
      
      <rect x="816" y="680" width="120" height="36" rx="6" fill="#3b82f6" filter="url(#smallShadow)"/>
      <text x="876" y="704" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="13" font-weight="500">保存</text>
    </g>
    
    <!-- 标签 -->
    <text x="600" y="750" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">✓ 测试成功状态</text>
  </g>
  
  <!-- ========== 右侧：测试失败状态 ========== -->
  <g transform="translate(300, 0)">
    <g filter="url(#shadow)">
      <rect x="200" y="80" width="800" height="640" rx="16" fill="#1e293b"/>
      
      <!-- 标题栏 -->
      <rect x="200" y="80" width="800" height="56" rx="16" fill="#1e293b"/>
      <circle cx="228" cy="108" r="6" fill="#ef4444"/>
      <circle cx="248" cy="108" r="6" fill="#fbbf24"/>
      <circle cx="268" cy="108" r="6" fill="#22c55e"/>
      <text x="600" y="113" text-anchor="middle" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="15" font-weight="600">新建连接</text>
      
      <!-- 左侧数据库类型选择 -->
      <rect x="200" y="136" width="200" height="584" fill="#0f172a"/>
      <text x="224" y="168" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">选择数据库类型</text>
      
      <!-- PostgreSQL 选中 -->
      <rect x="216" y="184" width="168" height="56" rx="8" fill="#334155"/>
      <text x="276" y="214" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13" font-weight="500">PostgreSQL</text>
      
      <!-- 右侧表单区域 -->
      <text x="440" y="168" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">连接配置</text>
      
      <!-- 连接名称 -->
      <text x="440" y="204" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">连接名称</text>
      <text x="555" y="204" fill="#ef4444" font-family="Inter, sans-serif" font-size="13">*</text>
      <rect x="440" y="212" width="520" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="456" y="236" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">主数据库</text>
      
      <!-- 主机地址 (错误高亮) -->
      <text x="440" y="276" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">主机地址</text>
      <text x="532" y="276" fill="#ef4444" font-family="Inter, sans-serif" font-size="13">*</text>
      <rect x="440" y="284" width="360" height="36" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
      <text x="456" y="308" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">wrong-host.example.com</text>
      <!-- 错误图标 -->
      <circle cx="776" cy="302" r="8" fill="#ef4444" opacity="0.2"/>
      <text x="776" y="306" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="12">!</text>
      
      <!-- 端口 -->
      <text x="820" y="276" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">端口</text>
      <text x="860" y="276" fill="#ef4444" font-family="Inter, sans-serif" font-size="13">*</text>
      <rect x="820" y="284" width="140" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="836" y="308" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">5432</text>
      
      <!-- 数据库名 -->
      <text x="440" y="348" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">数据库名</text>
      <rect x="440" y="356" width="520" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="456" y="380" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">myapp_production</text>
      
      <!-- 用户名 -->
      <text x="440" y="420" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">用户名</text>
      <rect x="440" y="428" width="360" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="456" y="452" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">postgres</text>
      
      <!-- 密码 -->
      <text x="820" y="420" fill="#f1f5f9" font-family="Inter, sans-serif" font-size="13">密码</text>
      <rect x="820" y="428" width="140" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="836" y="452" fill="#64748b" font-family="Inter, sans-serif" font-size="13">••••••••</text>
      
      <!-- 测试失败提示框 -->
      <rect x="440" y="492" width="520" height="100" rx="8" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
      <circle cx="464" cy="524" r="12" fill="#ef4444" opacity="0.2"/>
      <text x="468" y="529" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="14" font-weight="bold">✕</text>
      <text x="488" y="520" fill="#ef4444" font-family="Inter, sans-serif" font-size="14" font-weight="500">连接失败</text>
      <text x="488" y="544" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12">错误: 无法连接到服务器</text>
      <text x="488" y="564" fill="#64748b" font-family="Inter, sans-serif" font-size="11">详细信息: Connection refused (ECONNREFUSED)</text>
      <text x="488" y="580" fill="#3b82f6" font-family="Inter, sans-serif" font-size="11">查看解决方案 →</text>
      
      <!-- 高级设置折叠 -->
      <rect x="440" y="612" width="520" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="456" y="638" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">高级设置</text>
      <path d="M936 622 L944 630 L952 622" fill="none" stroke="#64748b" stroke-width="1.5"/>
      
      <!-- 底部按钮 -->
      <rect x="200" y="664" width="800" height="56" rx="0 0 16 16" fill="#1e293b"/>
      <rect x="200" y="664" width="800" height="1" fill="#334155"/>
      
      <!-- 测试连接按钮 -->
      <rect x="440" y="680" width="120" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="500" y="704" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">重新测试</text>
      
      <rect x="720" y="680" width="80" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="760" y="704" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="13">取消</text>
      
      <rect x="816" y="680" width="120" height="36" rx="6" fill="#334155"/>
      <text x="876" y="704" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="13">保存</text>
    </g>
    
    <!-- 标签 -->
    <text x="600" y="750" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">✕ 测试失败状态</text>
  </g>
</svg>