<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 发光滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="20" y="20" width="260" height="260" rx="60" fill="url(#mainGradient)" filter="url(#shadow)"/>
  
  <!-- 主六边形容器 -->
  <polygon points="150,70 195,97 195,157 150,184 105,157 105,97" 
           fill="#ffffff" opacity="0.98"/>
  <polygon points="150,70 195,97 195,157 150,184 105,157 105,97" 
           fill="none" stroke="url(#mainGradient)" stroke-width="3.5" stroke-linejoin="round"/>
  
  <!-- 网格系统 - 垂直线 -->
  <line x1="150" y1="70" x2="150" y2="184" 
        stroke="url(#mainGradient)" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- 网格系统 - 对角线1 -->
  <line x1="105" y1="97" x2="195" y2="157" 
        stroke="url(#mainGradient)" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- 网格系统 - 对角线2 -->
  <line x1="105" y1="157" x2="195" y2="97" 
        stroke="url(#mainGradient)" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- 交叉点装饰圆点 -->
  <circle cx="127.5" cy="112" r="4" fill="url(#mainGradient)"/>
  <circle cx="172.5" cy="112" r="4" fill="url(#mainGradient)"/>
  <circle cx="127.5" cy="142" r="4" fill="url(#mainGradient)"/>
  <circle cx="172.5" cy="142" r="4" fill="url(#mainGradient)"/>
  
  <!-- 中心焦点 - 三层设计 -->
  <circle cx="150" cy="127" r="16" fill="url(#mainGradient)" filter="url(#glow)"/>
  <circle cx="150" cy="127" r="9" fill="#ffffff"/>
  <circle cx="150" cy="127" r="4" fill="url(#mainGradient)"/>
  
  <!-- SQL标签 -->
  <rect x="105" y="200" width="90" height="38" rx="19" fill="#ffffff" opacity="0.98"/>
  <text x="150" y="226" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
        font-size="20" fill="url(#mainGradient)" font-weight="800" letter-spacing="2">SQL</text>
  
  <!-- 光泽效果 -->
  <!-- <ellipse cx="80" y="55" rx="30" ry="18" fill="#ffffff" opacity="0.25"/> -->
  
  <!-- 边角装饰点 -->
  <circle cx="250" cy="50" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="260" cy="65" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="50" cy="250" r="2.5" fill="#ffffff" opacity="0.5"/>
</svg>